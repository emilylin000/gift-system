<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>鎔德行銷 · 贈品管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efe9;
  --text:#1a1a1a;--text2:#666;--text3:#999;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
  --blue-bg:#E6F1FB;--blue-text:#0C447C;
  --green-bg:#EAF3DE;--green-text:#27500A;
  --amber-bg:#FAEEDA;--amber-text:#633806;
  --red-bg:#FCEBEB;--red-text:#A32D2D;
  --teal-bg:#E1F5EE;--teal-text:#085041;
  --radius:8px;--radius-lg:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;min-height:100vh}

/* NAV */
.nav{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:50}
.nav-brand{font-size:15px;font-weight:500;padding:14px 0;margin-right:24px;white-space:nowrap}
.nav-tabs{display:flex;gap:0}
.nav-tab{padding:14px 16px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s;white-space:nowrap}
.nav-tab:hover{color:var(--text)}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:500}

/* LAYOUT */
.page{display:none;padding:24px;max-width:1200px;margin:0 auto}
.page.active{display:block}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg);border-radius:var(--radius);padding:14px 16px;border:0.5px solid var(--border)}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.stat-value{font-size:22px;font-weight:500}
.stat-unit{font-size:13px;font-weight:400;color:var(--text2)}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.toolbar input[type=text]{flex:1;min-width:160px;height:34px;padding:0 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);outline:none}
.toolbar input[type=text]:focus{border-color:#666}
.toolbar select{height:34px;padding:0 8px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);outline:none;cursor:pointer}
.btn{height:34px;padding:0 14px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg2)}
.btn-primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.btn-primary:hover{opacity:.85}
.btn-success{background:#0F6E56;color:#fff;border-color:#0F6E56}
.btn-success:hover{opacity:.85}
.btn-warn{background:#854F0B;color:#fff;border-color:#854F0B}
.btn-warn:hover{opacity:.85}
.btn-sm{height:28px;padding:0 10px;font-size:12px}

/* TABLE */
.table-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:auto}
thead th{padding:9px 12px;text-align:left;font-size:11px;font-weight:500;color:var(--text2);background:var(--bg2);border-bottom:0.5px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.03em}
tbody tr{border-bottom:0.5px solid var(--border)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--bg2)}
tbody td{padding:9px 12px;vertical-align:middle}
td.name-cell{max-width:240px}
td.name-cell .src{font-size:11px;color:var(--text2);margin-bottom:2px}
td.name-cell .nm{font-weight:500;color:var(--text)}

/* PHOTO */
.photo-thumb{width:52px;height:52px;border-radius:var(--radius);object-fit:cover;border:0.5px solid var(--border);cursor:pointer}
.photo-placeholder{width:52px;height:52px;border-radius:var(--radius);background:var(--bg2);border:0.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:18px}
.photo-placeholder:hover{background:var(--bg3);border-color:#999}

/* BADGE */
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:500;white-space:nowrap}
.badge-fin{background:var(--blue-bg);color:var(--blue-text)}
.badge-gen{background:var(--green-bg);color:var(--green-text)}

/* QTY */
.qty-low{color:#A32D2D;font-weight:500}
.qty-mid{color:#854F0B;font-weight:500}
.qty-ok{color:#27500A;font-weight:500}

/* ACTIONS */
.acts{display:flex;gap:5px;flex-wrap:nowrap}
.act-btn{height:26px;padding:0 9px;font-size:11px;border:0.5px solid var(--border2);border-radius:var(--radius);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap}
.act-btn:hover{background:var(--bg2);color:var(--text)}
.act-btn.del:hover{background:var(--red-bg);color:var(--red-text);border-color:#F09595}
.act-btn.use-btn:hover{background:var(--amber-bg);color:var(--amber-text);border-color:#EF9F27}
.act-btn.in-btn:hover{background:var(--green-bg);color:var(--green-text);border-color:#97C459}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--radius-lg);border:0.5px solid var(--border);padding:24px;width:min(500px,100%);max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:500;margin-bottom:18px}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);outline:none;font-family:inherit}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#666}
.form-row textarea{resize:vertical;min-height:64px}
.form-row.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}

/* PHOTO UPLOAD */
.photo-upload-area{border:0.5px dashed var(--border2);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;background:var(--bg2);color:var(--text2);font-size:13px;transition:.15s}
.photo-upload-area:hover{background:var(--bg3);border-color:#999}
.photo-preview{width:100%;max-height:160px;object-fit:contain;border-radius:var(--radius);margin-top:8px;border:0.5px solid var(--border)}

/* LOG TABLE */
.log-badge-in{background:var(--green-bg);color:var(--green-text)}
.log-badge-out{background:var(--amber-bg);color:var(--amber-text)}
.log-badge-event{background:var(--blue-bg);color:var(--blue-text)}
.log-badge-vip{background:#FBEAF0;color:#72243E}

/* USE TYPE TOGGLE */
.use-type-toggle{display:flex;gap:0;border:0.5px solid var(--border2);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.use-type-btn{flex:1;padding:8px 0;font-size:13px;text-align:center;cursor:pointer;background:var(--bg);color:var(--text2);border:none;transition:.15s;font-family:inherit}
.use-type-btn.active{background:var(--text);color:var(--bg);font-weight:500}
.use-type-btn:first-child{border-right:0.5px solid var(--border2)}

.cond-fields{transition:.15s}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:85vh;border-radius:var(--radius-lg);object-fit:contain}

/* EMPTY */
.empty-row td{text-align:center;padding:40px;color:var(--text3)}

/* SUMMARY */
.summary-line{font-size:12px;color:var(--text2);margin-bottom:10px}
.summary-line strong{color:var(--text)}

/* RESPONSIVE */
@media(max-width:700px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .nav-tab{padding:12px 10px;font-size:12px}
  .page{padding:14px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">鎔德行銷 · 贈品管理</div>
  <div class="nav-tabs">
    <div class="nav-tab active" data-page="inventory">庫存總覽</div>
    <div class="nav-tab" data-page="log">贈品記錄</div>
  </div>
</nav>

<!-- ========== 庫存總覽 ========== -->
<div class="page active" id="page-inventory">
  <div class="stats-grid" id="statsGrid"></div>
  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="搜尋贈品來源或品項名稱..." oninput="renderInventory()" />
    <select id="catFilter" onchange="renderInventory()">
      <option value="">全部類別</option>
      <option value="財務列管">財務列管</option>
      <option value="一般贈品">一般贈品</option>
    </select>
    <select id="sortField" onchange="renderInventory()">
      <option value="name">名稱排序</option>
      <option value="price">單價排序</option>
      <option value="qty">數量排序</option>
      <option value="total">總值排序</option>
    </select>
    <select id="sortDir" onchange="renderInventory()">
      <option value="asc">升冪</option>
      <option value="desc">降冪</option>
    </select>
    <button class="btn btn-primary" onclick="openItemModal()">＋ 新增品項</button>
  </div>
  <div class="summary-line" id="summaryLine"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:60px">照片</th>
          <th>贈品來源</th>
          <th>品項名稱</th>
          <th>類別</th>
          <th>單價</th>
          <th>現有數量</th>
          <th>庫存總值</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="inventoryBody"></tbody>
    </table>
  </div>
</div>

<!-- ========== 贈品記錄 ========== -->
<div class="page" id="page-log">
  <div class="toolbar">
    <input type="text" id="logSearch" placeholder="搜尋品項..." oninput="renderLog()" />
    <select id="logType" onchange="renderLog()">
      <option value="">全部類型</option>
      <option value="in">贈品購入</option>
      <option value="event">活動使用</option>
      <option value="vip">主管公關使用</option>
    </select>
    <select id="logSort" onchange="renderLog()">
      <option value="newest">最新優先</option>
      <option value="oldest">最舊優先</option>
    </select>
    <button class="btn btn-success" onclick="openLogModal('in')">＋ 記錄購入</button>
    <button class="btn btn-warn" onclick="openLogModal('out')">− 記錄使用</button>
  </div>
  <div class="summary-line" id="logSummaryLine"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日期</th>
          <th>類型</th>
          <th>贈品來源</th>
          <th>品項名稱</th>
          <th>數量</th>
          <th>單價</th>
          <th>金額</th>
          <th>詳細資訊 / 備註</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="logBody"></tbody>
    </table>
  </div>
</div>

<!-- ========== 品項 Modal ========== -->
<div class="modal-overlay" id="itemModal" onclick="closeModalOverlay('itemModal',event)">
  <div class="modal">
    <h2 id="itemModalTitle">新增品項</h2>
    <div class="form-row">
      <label>贈品來源</label>
      <input id="fSrc" type="text" placeholder="例：2026總代理關懷贈品" />
    </div>
    <div class="form-row">
      <label>品項名稱</label>
      <input id="fName" type="text" placeholder="例：BMW經典撞色長傘" />
    </div>
    <div class="form-row">
      <label>類別</label>
      <select id="fCat">
        <option value="一般贈品">一般贈品</option>
        <option value="財務列管">財務列管</option>
      </select>
    </div>
    <div class="form-row two">
      <div>
        <label>單價 (NT$)</label>
        <input id="fPrice" type="number" min="0" step="0.1" placeholder="0" />
      </div>
      <div>
        <label>初始數量</label>
        <input id="fQty" type="number" min="0" step="1" placeholder="0" />
      </div>
    </div>
    <div class="form-row">
      <label>贈品照片</label>
      <div class="photo-upload-area" id="photoUploadArea" onclick="document.getElementById('photoFileInput').click()">
        點擊上傳照片（JPG / PNG）
        <img id="photoPreview" class="photo-preview" style="display:none" />
      </div>
      <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhotoUpload(event)" />
    </div>
    <div class="form-row">
      <label>備註</label>
      <textarea id="fNote" placeholder="選填備註..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('itemModal')">取消</button>
      <button class="btn btn-primary" onclick="saveItem()">儲存</button>
    </div>
  </div>
</div>

<!-- ========== 記錄 Modal ========== -->
<div class="modal-overlay" id="logModal" onclick="closeModalOverlay('logModal',event)">
  <div class="modal">
    <h2 id="logModalTitle">記錄贈品購入</h2>
    <div class="form-row">
      <label>日期</label>
      <input id="lDate" type="date" />
    </div>
    <div class="form-row">
      <label>品項</label>
      <select id="lItem" onchange="fillLogPrice()">
        <option value="">請選擇品項...</option>
      </select>
    </div>
    <div class="form-row two">
      <div>
        <label>數量</label>
        <input id="lQty" type="number" min="1" step="1" placeholder="1" value="1" />
      </div>
      <div>
        <label>單價 (NT$)</label>
        <input id="lPrice" type="number" min="0" step="0.1" placeholder="0" />
      </div>
    </div>

    <!-- 使用類型切換（僅 out 時顯示） -->
    <div id="useTypeSection" style="display:none">
      <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px">使用類型</div>
      <div class="use-type-toggle">
        <button class="use-type-btn active" id="btnEvent" onclick="switchUseType('event')">活動使用</button>
        <button class="use-type-btn" id="btnVip" onclick="switchUseType('vip')">主管公關使用</button>
      </div>

      <!-- 活動使用欄位 -->
      <div id="fieldsEvent" class="cond-fields">
        <div class="form-row">
          <label>報告書發文字號</label>
          <input id="lDocNo" type="text" placeholder="例：鎔行字第1140001號" />
        </div>
        <div class="form-row">
          <label>活動名稱</label>
          <input id="lEventName" type="text" placeholder="例：2026 BMW春季品牌活動" />
        </div>
      </div>

      <!-- 主管公關欄位 -->
      <div id="fieldsVip" class="cond-fields" style="display:none">
        <div class="form-row two">
          <div>
            <label>主管姓名</label>
            <input id="lManager" type="text" placeholder="例：王總經理" />
          </div>
          <div>
            <label>客戶姓名</label>
            <input id="lClient" type="text" placeholder="例：陳先生" />
          </div>
        </div>
      </div>
    </div>

    <div class="form-row">
      <label>備註</label>
      <textarea id="lNote" placeholder="選填備註..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal('logModal')">取消</button>
      <button class="btn btn-primary" onclick="saveLog()">確認記錄</button>
    </div>
  </div>
</div>

<!-- ========== 大圖 Lightbox ========== -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightboxImg" src="" alt="" />
</div>

    {id:30,src:'鎔德自製',name:'雙層網紗收納袋',cat:'一般贈品',price:37.8,qty:450,note:'',photo:''},
  ];
  saveItems();
}
let logs = JSON.parse(localStorage.getItem(LOGS_KEY) || '[]');
let nextItemId = Math.max(0,...items.map(i=>i.id))+1;
let nextLogId  = logs.length ? Math.max(...logs.map(l=>l.id))+1 : 1;
let editingItemId = null;
let currentLogType = 'in';
let pendingPhoto = '';

function saveItems(){ localStorage.setItem(ITEMS_KEY, JSON.stringify(items)); }
function saveLogs() { localStorage.setItem(LOGS_KEY,  JSON.stringify(logs));  }

function fmtN(n){ return Math.round(n).toLocaleString('zh-TW'); }
function fmtP(p){ return Number(p).toLocaleString('zh-TW',{minimumFractionDigits:p%1===0?0:1,maximumFractionDigits:1}); }
function today(){ return new Date().toISOString().slice(0,10); }

/* ===== NAV ===== */
document.querySelectorAll('.nav-tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('page-'+tab.dataset.page).classList.add('active');
    if(tab.dataset.page==='log') renderLog();
  });
});

/* ===== INVENTORY ===== */
function getFiltered(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const sf=document.getElementById('sortField').value;
  const sd=document.getElementById('sortDir').value;
  let data=items.filter(i=>{
    const txt=(i.src+i.name).toLowerCase();
    return txt.includes(q)&&(cat===''||i.cat===cat);
  });
  data.sort((a,b)=>{
    if(sf==='name') return sd==='asc'?(a.src+a.name).localeCompare(b.src+b.name,'zh-Hant'):(b.src+b.name).localeCompare(a.src+a.name,'zh-Hant');
    const av=sf==='price'?a.price:sf==='qty'?a.qty:a.price*a.qty;
    const bv=sf==='price'?b.price:sf==='qty'?b.qty:b.price*b.qty;
    return sd==='asc'?av-bv:bv-av;
  });
  return data;
}

function renderInventory(){
  const data=getFiltered();
  const allQty=items.reduce((s,i)=>s+i.qty,0);
  const allVal=items.reduce((s,i)=>s+i.price*i.qty,0);
  const finVal=items.filter(i=>i.cat==='財務列管').reduce((s,i)=>s+i.price*i.qty,0);
  const genVal=items.filter(i=>i.cat==='一般贈品').reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('statsGrid').innerHTML=`
    <div class="stat-card"><div class="stat-label">品項總數</div><div class="stat-value">${items.length}<span class="stat-unit"> 項</span></div></div>
    <div class="stat-card"><div class="stat-label">庫存總量</div><div class="stat-value">${fmtN(allQty)}<span class="stat-unit"> 件</span></div></div>
    <div class="stat-card"><div class="stat-label">財務列管總值</div><div class="stat-value">${fmtN(finVal)}<span class="stat-unit"> 元</span></div></div>
    <div class="stat-card"><div class="stat-label">一般贈品總值</div><div class="stat-value">${fmtN(genVal)}<span class="stat-unit"> 元</span></div></div>
  `;
  const filtQty=data.reduce((s,i)=>s+i.qty,0);
  const filtVal=data.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('summaryLine').innerHTML=`顯示 <strong>${data.length}</strong> 項 · 數量 <strong>${fmtN(filtQty)}</strong> 件 · 總值 <strong>NT$ ${fmtN(filtVal)}</strong>`;

  const tbody=document.getElementById('inventoryBody');
  if(!data.length){tbody.innerHTML=`<tr class="empty-row"><td colspan="8">找不到符合的品項</td></tr>`;return;}
  tbody.innerHTML=data.map(i=>{
    const qc=i.qty<=10?'qty-low':i.qty<=30?'qty-mid':'qty-ok';
    const photo=i.photo
      ?`<img class="photo-thumb" src="${i.photo}" alt="" onclick="openLightbox('${i.id}')" />`
      :`<div class="photo-placeholder" onclick="quickPhoto(${i.id})">+</div>`;
    return `<tr>
      <td>${photo}</td>
      <td style="color:var(--text2);font-size:12px;max-width:160px;word-break:break-all">${esc(i.src)}</td>
      <td style="max-width:200px;word-break:break-all;font-weight:500">${esc(i.name)}${i.note?`<div style="font-size:11px;color:var(--text2);font-weight:400">${esc(i.note)}</div>`:''}</td>
      <td><span class="badge ${i.cat==='財務列管'?'badge-fin':'badge-gen'}">${i.cat}</span></td>
      <td>NT$ ${fmtP(i.price)}</td>
      <td class="${qc}">${i.qty}</td>
      <td>NT$ ${fmtN(i.price*i.qty)}</td>
      <td><div class="acts">
        <button class="act-btn in-btn" onclick="quickLog(${i.id},'in')">購入</button>
        <button class="act-btn use-btn" onclick="quickLog(${i.id},'out')">使用</button>
        <button class="act-btn" onclick="openItemModal(${i.id})">編輯</button>
        <button class="act-btn del" onclick="deleteItem(${i.id})">刪除</button>
      </div></td>
    </tr>`;
  }).join('');
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===== PHOTO ===== */
function handlePhotoUpload(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingPhoto=ev.target.result;
    const prev=document.getElementById('photoPreview');
    prev.src=pendingPhoto; prev.style.display='block';
    document.getElementById('photoUploadArea').childNodes[0].textContent='點擊更換照片';
  };
  reader.readAsDataURL(file);
}
let quickPhotoTargetId=null;
function quickPhoto(id){
  quickPhotoTargetId=id;
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*';
  inp.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const item=items.find(x=>x.id===id);
      if(item){ item.photo=ev.target.result; saveItems(); renderInventory(); }
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

/* ===== LIGHTBOX ===== */
function openLightbox(idStr){
  const id=parseInt(idStr);
  const item=items.find(i=>i.id===id);
  if(!item||!item.photo) return;
  document.getElementById('lightboxImg').src=item.photo;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){ document.getElementById('lightbox').classList.remove('open'); }

/* ===== ITEM MODAL ===== */
function openItemModal(id){
  editingItemId=id||null;
  pendingPhoto='';
  document.getElementById('itemModalTitle').textContent=id?'編輯品項':'新增品項';
  const prev=document.getElementById('photoPreview');
  prev.style.display='none'; prev.src='';
  document.getElementById('photoUploadArea').childNodes[0].textContent='點擊上傳照片（JPG / PNG）';
  document.getElementById('photoFileInput').value='';
  if(id){
    const i=items.find(x=>x.id===id);
    document.getElementById('fSrc').value=i.src;
    document.getElementById('fName').value=i.name;
    document.getElementById('fCat').value=i.cat;
    document.getElementById('fPrice').value=i.price;
    document.getElementById('fQty').value=i.qty;
    document.getElementById('fNote').value=i.note||'';
    if(i.photo){ prev.src=i.photo; prev.style.display='block'; pendingPhoto=i.photo; }
  } else {
    document.getElementById('fSrc').value='';
    document.getElementById('fName').value='';
    document.getElementById('fCat').value='一般贈品';
    document.getElementById('fPrice').value='';
    document.getElementById('fQty').value='';
    document.getElementById('fNote').value='';
  }
  document.getElementById('itemModal').classList.add('open');
}
function saveItem(){
  const src=document.getElementById('fSrc').value.trim();
  const name=document.getElementById('fName').value.trim();
  if(!name){alert('請填寫品項名稱');return;}
  const cat=document.getElementById('fCat').value;
  const price=parseFloat(document.getElementById('fPrice').value)||0;
  const qty=parseInt(document.getElementById('fQty').value)||0;
  const note=document.getElementById('fNote').value.trim();
  if(editingItemId){
    const i=items.find(x=>x.id===editingItemId);
    i.src=src; i.name=name; i.cat=cat; i.price=price; i.qty=qty; i.note=note;
    if(pendingPhoto) i.photo=pendingPhoto;
  } else {
    items.push({id:nextItemId++,src,name,cat,price,qty,note,photo:pendingPhoto});
  }
  saveItems(); closeModal('itemModal'); renderInventory();
}
function deleteItem(id){
  if(!confirm('確定要刪除此品項？')) return;
  items=items.filter(i=>i.id!==id);
  saveItems(); renderInventory();
}

/* ===== LOG MODAL ===== */
let currentUseType='event';
function switchUseType(t){
  currentUseType=t;
  document.getElementById('btnEvent').classList.toggle('active',t==='event');
  document.getElementById('btnVip').classList.toggle('active',t==='vip');
  document.getElementById('fieldsEvent').style.display=t==='event'?'':'none';
  document.getElementById('fieldsVip').style.display=t==='vip'?'':'none';
}
function populateLogSelect(){
  const sel=document.getElementById('lItem');
  sel.innerHTML='<option value="">請選擇品項...</option>';
  [...items].sort((a,b)=>(a.src+a.name).localeCompare(b.src+b.name,'zh-Hant')).forEach(i=>{
    const opt=document.createElement('option');
    opt.value=i.id;
    opt.textContent=`${i.src} · ${i.name}（庫存 ${i.qty}）`;
    sel.appendChild(opt);
  });
}
function openLogModal(type,itemId){
  currentLogType=type;
  document.getElementById('logModalTitle').textContent=type==='in'?'記錄贈品購入':'記錄贈品使用';
  document.getElementById('lDate').value=today();
  document.getElementById('lQty').value=1;
  document.getElementById('lNote').value='';
  document.getElementById('lDocNo')&&(document.getElementById('lDocNo').value='');
  document.getElementById('lEventName')&&(document.getElementById('lEventName').value='');
  document.getElementById('lManager')&&(document.getElementById('lManager').value='');
  document.getElementById('lClient')&&(document.getElementById('lClient').value='');
  document.getElementById('useTypeSection').style.display=type==='out'?'':'none';
  switchUseType('event');
  populateLogSelect();
  if(itemId){ document.getElementById('lItem').value=itemId; fillLogPrice(); }
  else { document.getElementById('lPrice').value=''; }
  document.getElementById('logModal').classList.add('open');
}
function quickLog(id,type){ openLogModal(type,id); }
function fillLogPrice(){
  const id=parseInt(document.getElementById('lItem').value);
  const item=items.find(i=>i.id===id);
  document.getElementById('lPrice').value=item?item.price:'';
}
function saveLog(){
  const itemId=parseInt(document.getElementById('lItem').value);
  if(!itemId){alert('請選擇品項');return;}
  const item=items.find(i=>i.id===itemId);
  if(!item){alert('品項不存在');return;}
  const qty=parseInt(document.getElementById('lQty').value)||0;
  if(qty<=0){alert('請輸入有效數量');return;}
  if(currentLogType==='out'&&qty>item.qty){alert(`庫存不足（現有 ${item.qty} 件）`);return;}
  const price=parseFloat(document.getElementById('lPrice').value)||0;
  const note=document.getElementById('lNote').value.trim();
  const date=document.getElementById('lDate').value||today();
  let extra={};
  if(currentLogType==='out'){
    extra.useType=currentUseType;
    if(currentUseType==='event'){
      extra.docNo=document.getElementById('lDocNo').value.trim();
      extra.eventName=document.getElementById('lEventName').value.trim();
    } else {
      extra.manager=document.getElementById('lManager').value.trim();
      extra.client=document.getElementById('lClient').value.trim();
    }
  }
  if(currentLogType==='in') item.qty+=qty;
  else item.qty-=qty;
  logs.push({id:nextLogId++,date,type:currentLogType,itemId,src:item.src,name:item.name,qty,price,note,...extra});
  saveItems(); saveLogs();
  closeModal('logModal'); renderInventory();
  if(document.getElementById('page-log').classList.contains('active')) renderLog();
}

/* ===== LOG TABLE ===== */
function renderLog(){
  const q=document.getElementById('logSearch').value.trim().toLowerCase();
  const type=document.getElementById('logType').value;
  const sort=document.getElementById('logSort').value;
  let data=[...logs].filter(l=>{
    const txt=(l.src+l.name+(l.docNo||'')+(l.eventName||'')+(l.manager||'')+(l.client||'')).toLowerCase();
    return txt.includes(q)&&(type===''||l.type===type||(type==='event'&&l.useType==='event')||(type==='vip'&&l.useType==='vip'));
  });
  data.sort((a,b)=>sort==='newest'?b.id-a.id:a.id-b.id);
  const totalIn=logs.filter(l=>l.type==='in').reduce((s,l)=>s+l.qty,0);
  const totalOut=logs.filter(l=>l.type==='out').reduce((s,l)=>s+l.qty,0);
  document.getElementById('logSummaryLine').innerHTML=`共 <strong>${logs.length}</strong> 筆記錄 · 購入合計 <strong>${totalIn}</strong> 件 · 使用合計 <strong>${totalOut}</strong> 件`;
  const tbody=document.getElementById('logBody');
  if(!data.length){tbody.innerHTML=`<tr class="empty-row"><td colspan="10">尚無記錄</td></tr>`;return;}
  tbody.innerHTML=data.map(l=>{
    let typeBadge,detail='';
    if(l.type==='in'){
      typeBadge=`<span class="badge log-badge-in">購入</span>`;
    } else if(l.useType==='event'){
      typeBadge=`<span class="badge log-badge-event">活動使用</span>`;
      const parts=[];
      if(l.docNo) parts.push(`字號：${esc(l.docNo)}`);
      if(l.eventName) parts.push(`活動：${esc(l.eventName)}`);
      detail=parts.join('<br>');
    } else {
      typeBadge=`<span class="badge log-badge-vip">主管公關</span>`;
      const parts=[];
      if(l.manager) parts.push(`主管：${esc(l.manager)}`);
      if(l.client) parts.push(`客戶：${esc(l.client)}`);
      detail=parts.join('<br>');
    }
    return `<tr>
      <td style="white-space:nowrap">${l.date}</td>
      <td>${typeBadge}</td>
      <td style="color:var(--text2);font-size:12px">${esc(l.src||'')}</td>
      <td style="font-weight:500">${esc(l.name)}</td>
      <td>${l.type==='in'?'+':'−'}${l.qty}</td>
      <td>NT$ ${fmtP(l.price)}</td>
      <td>NT$ ${fmtN(l.price*l.qty)}</td>
      <td style="font-size:12px;color:var(--text2);line-height:1.6">${detail}${detail&&l.note?'<br>':''}${l.note?esc(l.note):''}</td>
      <td><button class="act-btn del" onclick="deleteLog(${l.id})">刪除</button></td>
    </tr>`;
  }).join('');
}
function deleteLog(id){
  if(!confirm('確定要刪除此記錄？注意：刪除記錄不會還原庫存數量。')) return;
  logs=logs.filter(l=>l.id!==id);
  saveLogs(); renderLog();
}

/* ===== MODAL UTILS ===== */
function closeModal(mid){ document.getElementById(mid).classList.remove('open'); }
function closeModalOverlay(mid,e){ if(e.target===document.getElementById(mid)) closeModal(mid); }

/* ===== INIT ===== */
renderInventory();
</script>
